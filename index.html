<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>模型車行情追蹤</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Diecast Market Tracker v3</p>
      <h1>模型車行情追蹤</h1>
      <p class="sub">照片、行情、建議購買價、備份匯入，手機更好用。</p>
    </div>
    <button id="exportBtn" class="ghost">匯出備份</button>
    <label class="ghost filebtn">匯入備份<input id="importFile" type="file" accept="application/json" hidden></label>
  </header>

  <main class="layout">
    <section class="panel form-panel">
      <h2>新增行情紀錄</h2>
      <form id="recordForm">
        <label>照片
          <input id="photo" type="file" accept="image/*" />
        </label>
        <img id="preview" class="preview hidden" alt="照片預覽" />

        <div class="grid2">
          <label>品牌
            <input id="brand" placeholder="例：MINI GT / Tomica" required />
          </label>
          <label>比例
            <input id="scale" placeholder="例：1:64" />
          </label>
        </div>

        <label>車款 / 關鍵字
          <input id="model" placeholder="例：Nissan GT-R R35 LBWK 白色" required />
        </label>

        <div class="grid2">
          <label>價格
            <input id="price" type="number" min="0" placeholder="例：370" required />
          </label>
          <label>來源
            <input id="source" placeholder="蝦皮 / FB / 露天" />
          </label>
        </div>

        <label>車況
          <select id="condition">
            <option>拆檢</option>
            <option>全新</option>
            <option>瑕疵</option>
          </select>
        </label>

        <label>備註
          <textarea id="note" rows="3" placeholder="例：含盒、拆封、盒損、限定版"></textarea>
        </label>

        <button class="primary" type="submit">加入紀錄</button>
      </form>
    </section>

    <section class="main-area">
      <section class="panel search-panel">
        <div>
          <h2>查詢目前行情</h2>
          <p>輸入品牌、車款、顏色或比例。</p>
        </div>
        <input id="search" class="search" placeholder="搜尋：MINI GT R35 白色" />
      </section>

      <section class="stats" id="summaryStats"></section>
      <section id="cards" class="cards"></section>
    </section>
  </main>

  <dialog id="detailDialog">
    <button id="closeDialog" class="close">×</button>
    <div id="detailContent"></div>
  </dialog>
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
